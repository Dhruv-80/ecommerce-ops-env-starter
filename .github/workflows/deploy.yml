name: Deploy to Hugging Face Space

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main

concurrency:
  group: hf-space-deploy-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    outputs:
      deploy_needed: ${{ steps.detect.outputs.deploy_needed }}
      framework: ${{ steps.detect.outputs.framework }}
      dependency_files: ${{ steps.detect.outputs.dependency_files }}
      relevant_changed_files: ${{ steps.detect.outputs.relevant_changed_files }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect framework, dependency files, and relevant changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          FRAMEWORK="unknown"
          if [[ -f package.json ]]; then
            FRAMEWORK="node"
          fi
          if [[ -f requirements.txt || -f pyproject.toml || -f Pipfile || -d server ]]; then
            FRAMEWORK="python"
          fi
          if [[ "$FRAMEWORK" == "python" ]] && (
            grep -Eiq 'fastapi|uvicorn' requirements.txt 2>/dev/null ||
            grep -Eiq 'fastapi|uvicorn' pyproject.toml 2>/dev/null ||
            [[ -f server/app.py ]]
          ); then
            FRAMEWORK="fastapi"
          fi
          echo "framework=$FRAMEWORK" >> "$GITHUB_OUTPUT"

          mapfile -t DEP_FILES < <(
            find . -maxdepth 3 -type f \( \
              -name 'requirements*.txt' -o \
              -name 'pyproject.toml' -o \
              -name 'Pipfile' -o \
              -name 'Pipfile.lock' -o \
              -name 'poetry.lock' -o \
              -name 'environment.yml' -o \
              -name 'package.json' -o \
              -name 'package-lock.json' -o \
              -name 'pnpm-lock.yaml' -o \
              -name 'yarn.lock' \
            \) | sed 's#^\./##' | sort -u
          )

          {
            echo "dependency_files<<EOF"
            if (( ${#DEP_FILES[@]} > 0 )); then
              printf '%s\n' "${DEP_FILES[@]}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          BEFORE_SHA="${{ github.event.before }}"
          CURRENT_SHA="${{ github.sha }}"
          if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" =~ ^0+$ ]]; then
            mapfile -t CHANGED_FILES < <(git show --pretty='' --name-only "$CURRENT_SHA" | sed '/^$/d')
          else
            mapfile -t CHANGED_FILES < <(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA" | sed '/^$/d')
          fi

          deploy_needed="false"
          relevant_list=()

          is_dependency_file() {
            local candidate="$1"
            for dep in "${DEP_FILES[@]:-}"; do
              if [[ "$candidate" == "$dep" ]]; then
                return 0
              fi
            done
            return 1
          }

          is_backend_source_change() {
            local file="$1"

            # Never deploy for test-only changes.
            if [[ "$file" == tests/* ]]; then
              return 1
            fi

            if [[ "$FRAMEWORK" == "fastapi" || "$FRAMEWORK" == "python" ]]; then
              # Repo-aware Python backend detection.
              if [[ "$file" == server/*.py || "$file" == server/**/*.py ]]; then
                return 0
              fi
              if [[ "$file" == *.py && "$file" != tests/* ]]; then
                return 0
              fi
              return 1
            fi

            if [[ "$FRAMEWORK" == "node" ]]; then
              if [[ "$file" == src/* || "$file" == src/**/* || "$file" == server/* || "$file" == server/**/* || "$file" == app/* || "$file" == app/**/* ]]; then
                if [[ "$file" == *.js || "$file" == *.mjs || "$file" == *.cjs || "$file" == *.ts ]]; then
                  return 0
                fi
              fi
              return 1
            fi

            return 1
          }

          for file in "${CHANGED_FILES[@]:-}"; do
            [[ -z "$file" ]] && continue

            if [[ "$file" == "Dockerfile" || "$file" == "docker-compose.yml" || "$file" == "docker-compose.yaml" ]]; then
              deploy_needed="true"
              relevant_list+=("$file")
              continue
            fi

            if is_dependency_file "$file"; then
              deploy_needed="true"
              relevant_list+=("$file")
              continue
            fi

            if is_backend_source_change "$file"; then
              deploy_needed="true"
              relevant_list+=("$file")
              continue
            fi
          done

          {
            echo "relevant_changed_files<<EOF"
            if (( ${#relevant_list[@]} > 0 )); then
              printf '%s\n' "${relevant_list[@]}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "deploy_needed=$deploy_needed" >> "$GITHUB_OUTPUT"

      - name: Report skip reason
        if: steps.detect.outputs.deploy_needed != 'true'
        run: |
          echo "No relevant backend/dependency/container changes detected. Skipping deploy."

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: analyze
    if: needs.analyze.outputs.deploy_needed == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate required files
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f Dockerfile ]]; then
            echo "Dockerfile is required but missing."
            exit 1
          fi

          framework="${{ needs.analyze.outputs.framework }}"
          if [[ "$framework" == "fastapi" ]]; then
            if [[ ! -f server/app.py ]]; then
              echo "Detected FastAPI project but server/app.py is missing."
              exit 1
            fi
          fi

          if [[ "$framework" == "python" || "$framework" == "fastapi" ]]; then
            if [[ ! -f requirements.txt && ! -f pyproject.toml && ! -f Pipfile ]]; then
              echo "Detected Python backend but no dependency file found (requirements.txt/pyproject.toml/Pipfile)."
              exit 1
            fi
          fi

          if [[ "$framework" == "node" ]]; then
            if [[ ! -f package.json ]]; then
              echo "Detected Node backend but package.json is missing."
              exit 1
            fi
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install test dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          elif [[ -f pyproject.toml ]]; then
            pip install .[test] || pip install .
          else
            echo "No supported Python dependency file found for tests."
            exit 1
          fi

      - name: Run pytest gate
        shell: bash
        run: |
          set -euo pipefail
          pytest -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate build configuration variables
        shell: bash
        env:
          CI_IMAGE_TAG: ${{ vars.CI_IMAGE_TAG }}
        run: |
          set -euo pipefail
          if [[ -z "${CI_IMAGE_TAG:-}" ]]; then
            echo "CI_IMAGE_TAG variable is missing."
            echo "Set repository variable CI_IMAGE_TAG (example: ecommerce-ops-env:ci)."
            exit 1
          fi

      - name: Build Docker image (validation gate)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ vars.CI_IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Hugging Face Space (only if files changed)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO }}
          HF_SPACE_BRANCH: ${{ vars.HF_SPACE_BRANCH }}
          DEPLOY_COMMIT_PREFIX: ${{ vars.DEPLOY_COMMIT_PREFIX }}
          DEPLOY_SYNC_EXCLUDES: ${{ vars.DEPLOY_SYNC_EXCLUDES }}
          GIT_BOT_NAME: ${{ vars.GIT_BOT_NAME }}
          GIT_BOT_EMAIL: ${{ vars.GIT_BOT_EMAIL }}
          GITHUB_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${HF_TOKEN:-}" ]]; then
            echo "HF_TOKEN secret is missing."
            exit 1
          fi

          if [[ -z "${HF_SPACE_REPO:-}" ]]; then
            echo "HF_SPACE_REPO variable is missing."
            echo "Set repository variable HF_SPACE_REPO to your Space URL (example: https://huggingface.co/spaces/<owner>/<space>)."
            exit 1
          fi

          if [[ -z "${HF_SPACE_BRANCH:-}" ]]; then
            echo "HF_SPACE_BRANCH variable is missing."
            echo "Set repository variable HF_SPACE_BRANCH (example: main)."
            exit 1
          fi

          if [[ -z "${DEPLOY_COMMIT_PREFIX:-}" ]]; then
            echo "DEPLOY_COMMIT_PREFIX variable is missing."
            echo "Set repository variable DEPLOY_COMMIT_PREFIX (example: chore: deploy from GitHub)."
            exit 1
          fi

          if [[ -z "${GIT_BOT_NAME:-}" ]]; then
            echo "GIT_BOT_NAME variable is missing."
            echo "Set repository variable GIT_BOT_NAME (example: github-actions[bot])."
            exit 1
          fi

          if [[ -z "${GIT_BOT_EMAIL:-}" ]]; then
            echo "GIT_BOT_EMAIL variable is missing."
            echo "Set repository variable GIT_BOT_EMAIL (example: 41898282+github-actions[bot]@users.noreply.github.com)."
            exit 1
          fi

          if [[ -z "${DEPLOY_SYNC_EXCLUDES:-}" ]]; then
            echo "DEPLOY_SYNC_EXCLUDES variable is missing."
            echo "Set repository variable DEPLOY_SYNC_EXCLUDES as comma-separated patterns (example: .git,.github)."
            exit 1
          fi

          tmp_dir="$(mktemp -d)"
          hf_dir="$tmp_dir/hf-space"

          git clone "https://oauth2:${HF_TOKEN}@${HF_SPACE_REPO#https://}" "$hf_dir"

          # Sync repository contents to HF Space, excluding only git metadata.
          IFS=',' read -r -a excludes <<< "$DEPLOY_SYNC_EXCLUDES"
          rsync_args=("-a" "--delete")
          for pattern in "${excludes[@]}"; do
            trimmed="$(echo "$pattern" | xargs)"
            if [[ -n "$trimmed" ]]; then
              rsync_args+=("--exclude" "$trimmed")
            fi
          done
          rsync "${rsync_args[@]}" ./ "$hf_dir/"

          cd "$hf_dir"

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to deploy. Skipping commit/push."
            exit 0
          fi

          git config user.name "$GIT_BOT_NAME"
          git config user.email "$GIT_BOT_EMAIL"

          git add -A
          git commit -m "${DEPLOY_COMMIT_PREFIX} ${GITHUB_SHA::7}"
          git push origin "HEAD:${HF_SPACE_BRANCH}"
